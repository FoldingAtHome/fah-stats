# nginx site config for stats.foldingathome.org — a static, client-rendered SPA
# with immutable hashed assets. Install with `make publish-nginx`, symlink into
# sites-enabled, `nginx -t`, then reload. See README.md (Deployment).

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name stats.foldingathome.org;

  root /var/www/stats.foldingathome.org/html;
  index index.html;

  # TLS (e.g. certbot-managed) — point these at the real certificate.
  ssl_certificate     /etc/letsencrypt/live/stats.foldingathome.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stats.foldingathome.org/privkey.pem;

  # Runtime config and the app shell must never be cached.
  location = /config.js  { add_header Cache-Control "no-store"; }
  location = /index.html { add_header Cache-Control "no-store"; }

  # Hashed build chunks (vite assetsDir: static) are content-addressed.
  location /static/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: every other path serves index.html (vue-router handles it).
  location / { try_files $uri $uri/ /index.html; }
}

server {
  listen 80;
  listen [::]:80;
  server_name stats.foldingathome.org;
  return 301 https://$host$request_uri;
}
