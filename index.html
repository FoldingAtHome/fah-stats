<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Folding@home Statistics</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap">
    <style>
      @font-face {
        font-family: 'SaintEliaRough';
        font-style: normal;
        font-weight: 700;
        src: url('/fonts/santeliaroughbold.woff2') format('woff2');
      }
    </style>
    <script>
      // Apply saved theme before first paint to avoid a flash. Default: light.
      try {
        document.documentElement.setAttribute(
          'data-theme', localStorage.getItem('theme') || 'light')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
